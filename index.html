<!DOCTYPE html>
<html>
<head>
  <title>Samira Vafayeslahi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 20px;
      border-bottom: 1px solid #ddd;
      margin-bottom: 20px;
    }

    .tab {
      cursor: pointer;
      padding: 10px 0;
      color: #004080;
    }

    .tab:hover {
      text-decoration: underline;
    }

    .tab.active {
      font-weight: bold;
      border-bottom: 2px solid #004080;
    }

    /* Sections */
    .section {
      display: none;
    }

    .section.active {
      display: block;
    }
  </style>
</head>

<body>

<h1>Samira Vafayeslahi</h1>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="showTab('about', this)">About</div>
  <div class="tab" onclick="showTab('research', this)">Research</div>
  <div class="tab" onclick="showTab('join', this)">Join Us</div>
  <div class="tab" onclick="showTab('publications', this)">Publications</div>
  <div class="tab" onclick="showTab('talks', this)">Talks</div>
</div>

<!-- Content -->
<div id="about" class="section active">
  <h2>About</h2>
  <p>Your bio goes here.</p>
</div>

<div id="research" class="section">
  <h2>Research</h2>
  <p>Your research description.</p>
</div>

<div id="join" class="section">
  <h2>Join Us</h2>
  <p>Information for students or collaborators.</p>
</div>

<div id="publications" class="section">
  <h2>Publications</h2>
  <p>Your papers list.</p>
</div>

<div id="talks" class="section">
  <h2>Talks</h2>
  <p>Your talks and presentations.</p>
</div>

<script>
function showTab(id, element) {
  // hide all sections
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
  });

  // remove active from tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });

  // show selected section
  document.getElementById(id).classList.add('active');
  element.classList.add('active');
}
</script>

</body>
</html>
